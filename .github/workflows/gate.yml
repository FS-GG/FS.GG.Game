name: gate

# Per-PR deterministic gate for FS.GG.Game (ADR-0022 / P2). Primary purpose (parity with the
# sibling repos, FS-GG/.github#7 / ADR-0006): restore in --locked-mode against the committed
# packages.lock.json so any dependency-graph drift, or a silently substituted version (NU1603) /
# out-of-range version (NU1608), FAILS the build instead of resolving quietly. It also builds and
# runs the whole (headless) Expecto suite so PRs get a real signal.
#
# FS.GG.Game.Core is BCL-only + its tests pull only public nuget.org packages (Expecto/FsCheck/
# Microsoft.NET.Test.Sdk/YoloDev + FSharp.Core), so this gate needs NO org-feed credential.
# P4 update (ADR-0022): FS.GG.Game.Render consumes FS.GG.UI.Scene @0.1.64-preview.1 — which is
# DUAL-PUBLISHED to nuget.org (ADR-0012/0013), so it restores from the public feed with no
# `packages: read` credential and no extra source.
#
# FSharp.Core (ADR-0032, superseding the old library-packs pin): the committed lockfiles record the
# NUGET.ORG contentHash, not the SDK's. The F# SDK injects sdk/<ver>/FSharp/library-packs into
# RestoreAdditionalProjectSources, and its FSharp.Core .nupkg differs from nuget.org's at the same
# id+version — so contentHash used to depend on WHICH SOURCE served it (CI resolved library-packs; a
# dev box with packageSourceMapping resolved nuget.org, and got NU1403 against the committed lock).
# DisableImplicitLibraryPacksFolder in the org-shared Directory.Build.props removes that folder from
# the source list, so FSharp.Core resolves from nuget.org everywhere and the hash is a function of
# (id, version) alone. If a lock hash ever mismatches here, regenerate it cold with force-evaluate —
# do NOT re-pin the lock to the SDK's library-packs hash: that is the reverted fix (ADR-0032 §3).
#
# EVERY RESTORE IN THIS FILE IS COLD (#135, adopting FS-GG/.github#429). --locked-mode raises NU1403
# by comparing the lock against the package ALREADY IN the global-packages folder — pre-seeded in the
# runner image, or restored from the actions cache — so with a warm folder it validates a record
# against a record and never contacts the feed. The gate's verdict was therefore a function of runner
# cache state, and it failed in BOTH directions: green on a lock no fresh clone could restore, red on
# a correct one. This repo's locks were in exactly that state for a release cycle (#152/#157/#161) and
# all six restores here stayed green over it.
#
# So the restore is not written inline any more: it lives in .github/actions/locked-restore, which
# resolves into a fresh empty NUGET_PACKAGES with the HTTP cache cleared, and `cache: false` is set on
# every job below. Both halves are load-bearing. Note that RestoreLockedMode is set for EVERY restore
# in CI by the org-shared Directory.Build.props (GITHUB_ACTIONS=true + a lockfile exists), so an
# implicit restore inside `dotnet build` is a locked restore too — which is why the jobs below all
# restore explicitly through the action and then build with --no-restore.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Deterministic gate (locked restore + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # NO NuGet cache, deliberately (#135 / FS-GG/.github#429). This used to read `cache: true`,
          # justified as "speed only — --locked-mode still validates the graph". It does not:
          # --locked-mode validates the committed contentHash against the package copy ALREADY in the
          # global-packages folder, so a cache hit is precisely what stops the gate from ever asking
          # the feed. A cache that can decide the verdict is not a cache, it is an input.
          #
          # The locked-restore action below now resolves into a fresh, empty NUGET_PACKAGES, so this
          # job's package folder is cold by construction and a setup-dotnet cache would be pure
          # overhead — restored, then never read. The cost is one real download per job; the gate
          # gets to be a function of the tree and the feed alone.
          cache: false

      # Locked restore is the single enforcement point, and it is now defined in exactly one place —
      # .github/actions/locked-restore — rather than copy-pasted into six jobs across two workflows.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      # --no-restore: restore already happened above (exactly once), into the cold NUGET_PACKAGES the
      # action exported to GITHUB_ENV. NU1603/NU1608 are promoted to errors in the org-shared
      # Directory.Build.props; FS/warnings-as-errors in local.props.
      - name: Build (net10.0)
        run: dotnet build FS.GG.Game.slnx -c Debug --no-restore

  # Separate job so a test failure is a distinct signal, not serialized behind the build gate. The
  # whole suite is headless (zero Skia / zero Scene) — the P2 exit invariant (ADR-0022).
  full-test-suite:
    name: Full test suite (dotnet test, headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # Cold by construction — see the gate job above.
          cache: false

      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      - name: Test (full suite)
        run: dotnet test FS.GG.Game.slnx -c Debug --no-restore

  # Determinism & property invariants — a DISTINCT signal for the capsule "constraint face" (the
  # game-logic corpus's determinism-as-a-tested-property rule; see
  # docs/reports/2026-07-07-game-capsule-contents-and-architectures.md §5). These invariants also
  # run inside the full suite above; this job surfaces them as their own red/green check AND — via
  # the zero-match guard — fails LOUDLY if the golden/property tests are ever renamed or removed. A
  # silent filter miss would otherwise pass green, which is exactly the "governance theater" the
  # capsule design rejects. Not org-managed; gate.yml is repo-local.
  determinism-invariants:
    name: Determinism & property invariants (constraint face)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # Cold by construction — see the gate job above.
          cache: false

      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      - name: Build (net10.0)
        run: dotnet build FS.GG.Game.slnx -c Debug --no-restore

      # Each filtered subset must report Failed:0 AND Passed:>=1. The Passed:[1-9] clause is the
      # zero-match guard: `dotnet test` exits 0 on a filter that matches nothing, so without this a
      # renamed/removed constraint-face test would go green. `determinism golden` is checked as its
      # own subset so the goldens specifically cannot vanish while other manifold tests remain.
      - name: Invariants (determinism goldens + manifold properties, zero-match guarded)
        run: |
          set -uo pipefail
          run_filtered() {
            local filter="$1" label="$2" out
            out=$(dotnet test FS.GG.Game.slnx -c Debug --no-build --no-restore --filter "$filter" 2>&1) || true
            echo "$out"
            if ! echo "$out" | grep -qE 'Failed:[[:space:]]+0,[[:space:]]+Passed:[[:space:]]+[1-9]'; then
              echo "::error::${label}: invariant tests failed OR the filter '${filter}' matched 0 tests (silent drift — the constraint-face tests were renamed or removed). Fix the tests or update the filter."
              exit 1
            fi
          }
          run_filtered "FullyQualifiedName~determinism golden" "determinism-golden"
          run_filtered "FullyQualifiedName~aabbContact" "collision-manifold-invariants"

  # Surface-baseline drift gate (Principle II: "visibility lives in .fsi"). Regenerates the public
  # surface baselines from the built assembly and fails on any uncommitted drift — the guard that a
  # public-API change is a deliberate, reviewed baseline update (and, for a packable, a SemVer bump).
  # The generator writes BOTH the type-level and the member-level baseline under that directory, so
  # this job sees a deleted or re-signatured public function, not just an added/removed type (#236).
  surface-baseline-drift:
    name: Surface baseline drift (readiness/surface-baselines)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # Cold by construction — see the gate job above.
          cache: false

      # This job used to lean on `dotnet build`'s IMPLICIT restore, which reads as innocent and is
      # not: RestoreLockedMode is set for every CI restore by the org-shared Directory.Build.props, so
      # that implicit restore was a LOCKED restore against a warm folder — the same defect as the
      # explicit ones, just harder to see. Restore explicitly, cold, then build with --no-restore.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      - name: Build (Debug — the generator reflects over the built assembly)
        run: dotnet build FS.GG.Game.slnx -c Debug --no-restore

      - name: Regenerate baselines
        run: dotnet fsi scripts/refresh-surface-baselines.fsx

      # `git status --porcelain`, NOT `git diff --exit-code`: diff only reports files git already
      # tracks, so a baseline the generator emits for the first time — a newly added package, or the
      # members/ directory itself — is invisible to it, and the gate reports green on a baseline
      # nobody committed. Untracked output is drift too.
      - name: Fail on uncommitted drift
        run: |
          set -euo pipefail
          drift="$(git status --porcelain --untracked-files=all -- readiness/surface-baselines)"
          if [ -n "$drift" ]; then
            echo "$drift"
            git diff -- readiness/surface-baselines
            echo "::error::public surface changed but readiness/surface-baselines/ was not updated. This gate covers both the type-level baselines and the member-level ones under members/ — a deleted or re-signatured public function drifts the latter. If this is an intentional API change, run: dotnet fsi scripts/refresh-surface-baselines.fsx  and commit the result (and bump the package SemVer if it is a break)."
            exit 1
          fi

  # Sync-not-fork drift gate (shared-build-config contract, ADR-0006). The three managed build-config
  # files (Directory.Build.props, Directory.Packages.props, .config/dotnet-tools.json) must stay
  # byte-identical to the org source of truth in FS-GG/.github dist/dotnet/. A hand-edit to a managed
  # file (or an un-re-synced org baseline bump) fails this job. Separate job = distinct signal.
  build-config-drift:
    name: Build-config drift check (shared-build-config)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v7

      - name: Checkout org build config (FS-GG/.github)
        uses: actions/checkout@v7
        with:
          repository: FS-GG/.github
          ref: main
          path: _org-build

      # The org script's own failure line reads `Re-run: scripts/sync-build-config.sh <repo>` — a path
      # that does not exist in THIS repo, or in any other receiver: the script lives in FS-GG/.github,
      # and a reader who follows the instruction literally gets `No such file or directory` (#247). So
      # the one gate whose whole job is "you have not re-synced" is also the one that cannot tell you
      # how. Every other job in this file hands back a command you can actually run; this one now does
      # too. The upstream message is FS-GG/.github's to fix (filed there) and this step is right either
      # way — it names the repo the script actually lives in, which a generic org-side message cannot.
      # A non-zero exit is NOT proof of drift, and saying so would repeat the very defect this step
      # exists to fix. The script also exits non-zero when it REFUSES TO RUN: the org source of truth
      # is malformed XML/JSON and it will not distribute it (.github#29 is that, having happened), or
      # it has moved/lost its exec bit in .github (126/127 — and an org file moving is exactly what
      # #248 was). Re-syncing fixes none of those, so we assert drift only when the script SAYS DRIFT,
      # and otherwise send the reader upstream. The script's own exit code is propagated, not flattened
      # to 1: `--check` exits 1 for drift and 2 for "you called me wrong", and that is worth keeping.
      - name: Drift check (managed files == source of truth)
        run: |
          set -uo pipefail
          out="$(_org-build/scripts/sync-build-config.sh --check "$GITHUB_WORKSPACE" 2>&1)"; rc=$?
          printf '%s\n' "$out"
          [ "$rc" -eq 0 ] && exit 0
          if printf '%s' "$out" | grep -q '^DRIFT'; then
            echo "::error::build-config drift: a managed file differs from the org source of truth in FS-GG/.github dist/dotnet/. The three managed files (Directory.Build.props, Directory.Packages.props, .config/dotnet-tools.json) are SYNCED, not authored here (ADR-0006, sync-not-fork) — do not hand-edit them to make this green. sync-build-config.sh is NOT in this repo; it lives in FS-GG/.github. To re-sync, from this repo's root run: rm -rf /tmp/fsgg-org && git clone --depth 1 https://github.com/FS-GG/.github.git /tmp/fsgg-org && /tmp/fsgg-org/scripts/sync-build-config.sh .  then commit the result. If instead the org baseline itself is wrong, change it in FS-GG/.github first — this gate tracks .github@main, so the source of truth moves before the receivers do."
          else
            echo "::error::the build-config drift check did not complete (exit $rc) — this is NOT drift, and re-syncing will not clear it. The check reported no DRIFT line, so it failed before it could compare: most likely the org source of truth in FS-GG/.github dist/dotnet/ is malformed and the script refused to distribute it (see .github#29), or _org-build/scripts/sync-build-config.sh moved or is not executable in FS-GG/.github. Read the script output above — the fix belongs in FS-GG/.github, not in this repo."
          fi
          exit "$rc"

  # Lock-range coherence gate (FS.GG.Game#153, adopting FS-GG/.github#495; ADR-0006). The locked
  # restore above is the enforcement point for package entries — id, version, contentHash — but it
  # structurally NEVER reads the dependency ranges under a `"type": "Project"` entry. So a release
  # bump that edits <Version> and regenerates no lock freezes every sibling project-reference range at
  # the old version, and every gate in this file stays green over it. That is not hypothetical here:
  # `release: v0.4.0` (#128) bumped Directory.Build.local.props and touched no lock, leaving
  # tests/Game.Render.Tests/packages.lock.json recording FS.GG.Game.Core at [0.3.0, ) for a whole
  # release cycle (#152, the data fix, now landed). Harmless at runtime — project references resolve
  # from the project graph, not the lock — which is precisely why it survived: the cost is a poisoned
  # lock diff, read by the one reviewer who can least afford noise, the one scrutinising a contentHash.
  #
  # Static: committed files only, so no SDK, no restore, no network, no feed, no NuGet auth. The check
  # script is authored once in public FS-GG/.github and sourced from there, so the gate cannot drift
  # per repo.
  #
  # min-ranges is left at its default of 1, and Game satisfies it with exactly one range
  # (Game.Render -> Game.Core). That is the fail-closed floor: a check that inspects nothing and
  # reports green is the defect, not the guard. If the project graph is ever restructured so that no
  # project references another, this job will red with "fewer than the 1 this repo declares" — pass
  # `min-ranges: 0` DELIBERATELY at that point rather than deleting the call, so that zero stays a
  # decision somebody made rather than an omission nobody noticed.
  lock-ranges:
    name: Lock-range coherence (project refs track declared versions)
    uses: FS-GG/.github/.github/workflows/lock-range-coherence.yml@main

  # Producer skill-manifest drift gate (ADR-0014 / ADR-0022 P4+P6). template/skill-manifest/
  # skill-manifest.json is the contract the .github org registry (registry/skills.yml) reconciles the
  # twelve owner:fs-gg-game skill rows from — "registry = manifest = bytes". The generator recomputes each
  # SKILL.md digest; this fails if the committed manifest drifts from the skill bodies (or the
  # generator), the guard that keeps the registry's owner:fs-gg-game rows honest. No build needed —
  # the generator only reads the SKILL.md files.
  skill-manifest-drift:
    name: Skill-manifest drift (template/skill-manifest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Fail on manifest drift
        run: |
          set -euo pipefail
          if ! dotnet fsi scripts/generate-skill-manifest.fsx --check; then
            echo "::error::template/skill-manifest/skill-manifest.json is stale vs the SKILL.md bodies/generator. Run: dotnet fsi scripts/generate-skill-manifest.fsx  and commit the result. If a skill body changed, the .github registry/skills.yml sha256 must be reconciled too (registry = manifest = bytes)."
            exit 1
          fi

  # Dangling skill-reference gate (FS.GG.Game#35, extended by #202 and #208). A published SKILL.md makes
  # three kinds of promise to its reader, and this job checks all three.
  #
  # A `[[wiki-ref]]` promises a skill that resolves. Before #35, 21 refs across all 5 skills pointed at
  # skills this repo does not publish (`fs-gg-scene`, `fs-gg-skiaviewer`, …, all owner:fs-gg-rendering),
  # and each newly authored skill inherited the defect. A ref must now either name a skill published here
  # or carry its publishing repo's registry owner id — `[[fs-gg-rendering:fs-gg-scene]]`.
  #
  # An ISSUE/PR LINK promises a live issue at the other end (#202). One sentence in fs-gg-persistence
  # pointed at a CLOSED issue for four generations running (Rendering#445 -> #535 -> #587 -> #535 again,
  # the last re-introduced by the very commit that adopted the "canonical" body) — and every rot was
  # caught by a HUMAN reading the prose, never by CI. This job was already scanning exactly these files
  # for dangling references; it just never looked at links. Right scope, wrong vocabulary.
  #
  # A closed link is an ERROR, not a warning, because a warning is what we already had: green CI and a
  # human expected to notice. Closed-and-still-correct is real (fs-gg-audio cites the issue that WIRED
  # the audio seam — history, and history stays closed), so a body may excuse one by name:
  #   <!-- skill-refs: closed-ok FS.GG.Rendering#245 — why -->
  # An excuse that no longer excuses anything is reported too: a stale allowlist is where the next rot
  # hides.
  #
  # THE LINK HALF IS SCOPED TO THE DIFF HERE (#238), and only here. Link state is f(WORLD): it decays
  # with no commit. Rendering#494 closed at 14:43:32Z and main@e4c07c2 — green at 14:35:30Z, unchanged
  # since — failed from that minute, reddening every PR then in flight. #235's was a PATHFINDING diff,
  # and the only edit that could clear it lived in a skill body outside that item's declared `Paths:`:
  # under ADR-0021/0027 the author could not fix it without widening onto a file their item had no
  # business touching. A merge gate may only demand a change inside the diff it gates. So `--changed`
  # resolves links only in the skill bodies THIS diff touches — where the fix is always in reach, and
  # where every rot #202 was written to catch is in fact introduced.
  #
  # The FULL sweep did not go away; it MOVED, to .github/workflows/skill-refs-sweep.yml, on a schedule,
  # gating nothing. Scoping without that sweep would leave links in unchanged bodies resolved by nobody
  # — green over an unexamined subject, the FS-GG/.github#416 shape this gate exists to close. The two
  # are one change. The [[ref]] and bare-#N halves are f(tree), hermetic, and still sweep the WHOLE tree
  # on every run: they cost nothing and cannot decay, so there is nothing to scope.
  #
  # A BARE `#N` PROMISES NOTHING IT CAN KEEP (#208), so it is an ERROR — not "unresolvable", but wrong by
  # construction. These bodies MATERIALIZE INTO SOMEBODY ELSE'S REPO, and GitHub renders `#999` against
  # the repo it is READ in: in a scaffolded product it links to that product's OWN tracker. It never
  # points here, so its upstream state is beside the point and repointing it cannot fix it. The only fix
  # is to QUALIFY it (`FS.GG.Game#999`), which survives materialization.
  #
  # Bare refs are genuinely ambiguous with prose — fs-gg-line-drawing says `the design doc's "#1 LOS
  # bug"`, meaning the number-one bug, not issue #1. That is an argument for an ESCAPE HATCH, not for
  # silence, so a body may declare the exception by number, as it does for a closed link:
  #   <!-- skill-refs: prose-ok #1 — why -->
  # This marker keys on a BARE INTEGER and so excuses every bare `#1` in that file: keep them rare.
  # See the header of scripts/check-skill-refs.sh for the full convention.
  #
  # GH_TOKEN: resolving a link is a handful of REST reads (no GraphQL) against PUBLIC repos, so the
  # default token suffices — it buys the 1,000/hr authenticated budget instead of a shared-IP 60/hr.
  # The script REFUSES to self-skip in CI: a link it cannot read is one it will not call green. (The
  # bare-`#N` check needs no network at all — there is no `#999` here to resolve it against.)
  skill-refs:
    name: Dangling skill refs (template/product-skills)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # `--changed <base>` has to be able to REACH the base to diff against it, and the default
          # depth-1 checkout does not contain it. The script fails safe if the base is unresolvable —
          # it announces the fallback and sweeps the whole tree — but that fallback would hand back
          # the very false-red this scoping removes, so fetch the history and mean it.
          fetch-depth: 0

      # QUOTED, and it must stay quoted: an unquoted ` #N` is a YAML comment, and the step name would
      # silently lose the very words that name the third check.
      - name: "Fail on a dangling [[ref]], a stale issue/PR link, or a bare #N"
        # The base to scope the LINK half against: the PR's merge base, or — on a push to main — the
        # commit main was at before. workflow_dispatch has neither, so it sweeps everything, which is
        # the right answer for a run somebody asked for by hand.
        #
        # `github.event.before` is all-zeros on a branch's first push and after a force push. That is
        # NOT "nothing changed": the script refuses to read it that way, says so, and sweeps the whole
        # tree. Degrade toward more checking, never less.
        run: |
          if [[ -n "${SKILL_REFS_BASE:-}" ]]; then
            scripts/check-skill-refs.sh --changed "$SKILL_REFS_BASE"
          else
            scripts/check-skill-refs.sh
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILL_REFS_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}

  # Tests for the gate ABOVE (FS.GG.Game#243). check-skill-refs.sh is ~600 lines of load-bearing bash
  # that decides whether every published skill body may ship, and it had no tests: every defect it has
  # ever had was found by a human reading it, which is precisely the property it was written to end
  # for other things. #241 came within one review of shipping a one-flag bug — a missing `grep -H` —
  # that would have reddened every correctly-marked citation on exactly the PRs that touch a skill,
  # i.e. the ones where the gate is supposed to be trustworthy. It would have looked like the gate
  # working. The suite pins that case, and every other promise the script makes, above all the one it
  # makes when it says nothing: "I will not report green over a subject I did not examine."
  #
  # Separate job = distinct signal, as everywhere in this file: a red HERE means the gate itself is
  # broken, which is a different fact from "a skill body has a bad pointer" and wants a different
  # reader — and if the gate is broken, its own verdict on the bodies is worth nothing anyway.
  #
  # Hermetic: the suite builds throwaway git repos and puts a fake `gh` on PATH, so it needs no token,
  # no network, and no fetch-depth. It also scrubs GITHUB_ACTIONS per case — the script's behaviour
  # genuinely forks on it, so a suite that inherited it would assert one thing on a laptop and another
  # in the very CI run that is meant to be gating it.
  skill-refs-tests:
    name: Skill-refs gate tests (scripts/check-skill-refs.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Behavioural test suite (fixture tree in, exit code + subject claim out)
        run: scripts/test-check-skill-refs.sh

  # Tests for the SWEEP (FS.GG.Game#251) — the OTHER half of skill-refs, and the half that files an
  # issue. #249 taught the daily sweep to render a finding and create/reopen/update/close a tracking
  # issue for it, so a decayed pointer stops being a red nobody reads. That filing path is now
  # load-bearing, and it had no test — and the trigger you would expect to supply one cannot:
  #
  #   skill-refs-sweep.yml runs on `pull_request` precisely so that "the sweep is itself code, and a
  #   change to it must be checked BY it". But the sweep's interesting code only runs when the tree is
  #   DECAYED, and the tree is normally green — so a PR that rewrites the renderer gets a GREEN run in
  #   which the renderer never executed. On #249's own run: render skipped, reconcile skipped, verdict
  #   skipped. A green check over a subject it never examined — the FS-GG/.github#416 shape, sitting
  #   in the code whose entire job is to not do that.
  #
  # So this suite plants the decay that trigger cannot, and drives the workflow's OWN `run:` blocks —
  # extracted from the YAML at test time, never transcribed — through all three render bodies and all
  # six reconcile branches, against a fake `gh` that reproduces the one behaviour that bit #249: `gh
  # api` switches to POST the moment a `-f` appears, which is how the tracker LOOKUP came to POST at
  # the create-issue endpoint, one missing field away from a daily blank-issue factory.
  #
  # It also pins the CROSS-FILE contract the sweep cannot self-diagnose: the `path:line: message` line
  # that check-skill-refs.sh emits and this workflow greps for. If those two drift apart, the sweep
  # files "could not read it" and names no files — so the suite runs the REAL script over REAL planted
  # decay and asserts the REAL parser still reads it.
  #
  # Runs on every PR, not just ones touching the sweep: that cross-file contract has two ends, and a
  # PR editing check-skill-refs.sh breaks it just as easily as one editing the workflow.
  #
  # Hermetic — fake `gh`, fixture trees, no token, no network. python3 + PyYAML parse the workflow (a
  # real parse, not a regex), which also means a workflow that does not PARSE fails here; both are
  # preinstalled on ubuntu-latest.
  skill-refs-sweep-tests:
    name: Skill-refs sweep tests (.github/workflows/skill-refs-sweep.yml)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # PyYAML ships on the ubuntu-latest image today, and the suite REFUSES to run without it rather
      # than degrading to a regex over the YAML — so an image that drops it would turn this gate red
      # on an innocent PR. The guard costs nothing when it is already there; it insures against image
      # drift rather than taking on a dependency.
      #
      # apt, NOT pip: the runner's system python is PEP-668 externally-managed, so
      # `pip install pyyaml` dies with `error: externally-managed-environment` — a fallback that
      # fails exactly when it is finally needed is worse than no fallback, because it reads as the
      # suite being broken rather than the image having moved.
      - name: Behavioural test suite (planted decay in, filed issue out)
        run: |
          python3 -c 'import yaml' 2>/dev/null || sudo apt-get install -y -qq python3-yaml
          scripts/test-skill-refs-sweep.sh

  # Tests for the HARNESS the two suites above stand on (FS.GG.Game#264). #259 extracted their shared
  # scaffolding into scripts/lib/test-harness.sh — the counters, the `expect_*` family, the counted
  # fixture builder, one faithful fake `gh`. That was right, and it moved the blast radius: a bug in
  # the harness now breaks BOTH suites, and the dangerous direction is not "both go red", which is
  # loud. It is BOTH GO GREEN. An `expect_has` that returns ok unconditionally, or a `fixture_new`
  # that stops writing `bin/gh` so no fake is ever on PATH, makes 169 assertions pass over a subject
  # nobody examined — while the two jobs above report, in green, that they examined it.
  #
  # That is the FS-GG/.github#416 shape sitting one level BENEATH the two gates written to refuse it,
  # and this repo has now met it at four descending depths (#238, #242, #251, #256).
  #
  # Separate job = distinct signal, as everywhere in this file. A red HERE means the two suites above
  # are not trustworthy — which is a strictly worse fact than either of them failing, and it wants a
  # different reader. If the harness is broken, their verdicts are worth nothing either way.
  #
  # THE SUITE DOES NOT USE THE HARNESS TO TEST THE HARNESS. It brings its own three-line assertions
  # and drives the harness black-box, as a subject, in a child bash — because a selftest built on
  # `expect_has` would pass unconditionally the moment `expect_has` did, which is the exact defect.
  # Every assertion is exercised in BOTH directions; the violated one is the one with teeth, and it is
  # the direction the two real suites never take, since a suite in the green never violates an
  # assertion.
  #
  # Hermetic: it shells out to nothing but bash and jq, builds its fixtures under mktemp, and puts the
  # fake `gh` on PATH ahead of any real one. No token, no network, no fetch-depth.
  harness-selftest:
    name: Test-harness selftest (scripts/lib/test-harness.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Behavioural test suite (probe in, exit code + counted verdict out)
        run: scripts/test-harness-selftest.sh

  # Shell lint (FS.GG.Game#258 for the workflows, #266 for the scripts). Every gate in this file
  # guards the PRODUCT. Nothing guarded the GATES — six workflow files, ~600 lines of YAML and several
  # hundred lines of shell inside `run:` blocks, and until now the first thing to read any of it was
  # GitHub, at dispatch time.
  #
  # The job lints shell in BOTH of the places this repo keeps it: inside `run:` blocks (via actionlint,
  # below) and in `scripts/` (directly, in the last step). The second half is #266 — the `run:` blocks
  # were the only shell anything had ever read, so the several hundred lines of bash that CI itself
  # SHELLS OUT TO were unlinted, and were already carrying `# shellcheck source=` pragmas written for
  # a run that never happened.
  #
  # That is the worst possible reader, because GitHub's reaction to a malformed workflow is to
  # SILENTLY NOT RUN IT, or to run it with the bad key ignored. A typo in a `run:` block is caught by
  # the shell; a typo in the STRUCTURE — `ifs:` for `if:`, `runs-on: ubuntu-latests`, a step reading
  # `steps.swep.outputs.rc` — is caught by nobody, and the only evidence is a check that quietly
  # stopped appearing. A gate that is silently not a gate is the FS-GG/.github#416 shape at the top
  # level, and this repo has now hit that shape at three descending depths (#238, #242, #251).
  #
  # #251 bolted on a lower bound — its test suite PyYAML-parses skill-refs-sweep.yml to extract the
  # `run:` blocks it tests, so a workflow that does not PARSE fails there. But parsing is not linting:
  # `ifs: false` parses perfectly, and so does `runs-on: ubuntu-latests`. actionlint knows the schema;
  # PyYAML only knows the grammar.
  #
  # THIS ONE MAY BLOCK, and that is the difference between it and the sweep. `skill-refs-sweep` cannot
  # be a required check because it is f(tree, WORLD) — a link rots on its own, and reddening whoever
  # happens to have a PR open is a false accusation (#238). actionlint is f(tree): hermetic, no world
  # state, no decay. Every red it raises was introduced by the diff in front of it, and the fix is
  # always inside that diff. So it gates, honestly.
  workflow-lint:
    # QUOTED, and it must stay quoted — for the same reason the skill-refs step name is, one gate up.
    # An unquoted `run:` inside a scalar is a mapping value, and YAML rejects the file outright. The
    # first thing this job ever did was catch that, in its own definition.
    name: "Shell lint (actionlint + shellcheck over every run: block, and over the repo's own scripts)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Pinned, and checksum-verified below. This binary reads every workflow in the repo and decides
      # whether they may merge; fetching whatever `latest` happens to be that morning would make the
      # gate's verdict a function of the release schedule of a third party.
      ACTIONLINT_VERSION: 1.7.7
      ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
      # ...and the argument above is not weaker for the tool actionlint DRIVES (#261). actionlint does
      # not lint shell itself; it shells out to whatever `shellcheck` it is given. Taking that one from
      # the runner image made half this gate reproducible and half of it a function of the image: the
      # verdict was f(tree, runner-image), and the second argument moves on its own schedule. It was
      # already drifting — #260 was developed against 0.10.0 and the run that merged it used the image's
      # 0.9.0 — and the failure that shape produces is the FALSE ACCUSATION #238 taught this repo to
      # refuse: GitHub bumps the image to a shellcheck with a new check (SC2320 and friends all arrived
      # in point releases), and the next PR goes red on a `run:` block it did not write, in a workflow
      # it never opened, unreproducibly, in a file its item never declared in `Paths:`.
      SHELLCHECK_VERSION: 0.11.0
      SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install actionlint (pinned + checksum-verified)
        run: |
          set -euo pipefail
          tgz="$RUNNER_TEMP/actionlint.tar.gz"
          curl -fsSL --retry 3 -o "$tgz" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${tgz}" | sha256sum -c -
          tar -xzf "$tgz" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -version

      - name: Install shellcheck (pinned + checksum-verified)
        run: |
          set -euo pipefail
          txz="$RUNNER_TEMP/shellcheck.tar.xz"
          curl -fsSL --retry 3 -o "$txz" \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  ${txz}" | sha256sum -c -
          tar -xJf "$txz" -C "$RUNNER_TEMP" --strip-components=1 \
            "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          "$RUNNER_TEMP/shellcheck" --version | sed -n 2p

      # THE SUBJECT IS CHECKED BEFORE THE VERDICT IS TRUSTED — twice, because this job's entire
      # purpose is to stop a green being reported over something nobody read, and it does not get to
      # do that to itself.
      #
      # 1. shellcheck. actionlint's shell linting is an INTEGRATION: handed a shellcheck it cannot
      #    execute, it does not fail and does not warn — it silently drops the shell half and exits 0.
      #    The `run:` blocks here hold several hundred lines of bash (skill-refs-sweep.yml alone is
      #    ~200, and it files GitHub issues), so that skip would leave the largest, sharpest part of
      #    the subject unread while the check went green.
      #
      #    Pinning it (above) does not remove that risk — it MOVES it. The image always had a
      #    shellcheck; a pinned download is one 404, one renamed asset, one corrupt tarball away from
      #    having none, and the degraded state is a GREEN. So the binary is checked as itself, and
      #    then actionlint's own verdict on it is checked too:
      #
      #      a. the pinned binary must exist and RUN (`--version`), which catches the 404 and the
      #         truncated tarball, and
      #      b. actionlint must not report the rule DISABLED. It says so in `-verbose` —
      #         `Rule "shellcheck" was disabled: ...` — and that line is the only direct evidence that
      #         the shell half ran at all. It is strictly stronger than (a): it also catches the wrong
      #         arch, a non-executable bit, an exec-format error, and every future reason we have not
      #         thought of, none of which (a) would notice.
      #
      #    Both are REDs. A gate whose subject silently halves must not report success. (Verified by
      #    mutation, #261: a `run:` block with an unquoted `$1` is caught with the pinned shellcheck
      #    and exits 1 — and passes at exit 0 with none.)
      #
      # 2. The file count. `actionlint` over zero files also exits 0. A green over an empty subject is
      #    the exact defect this job exists to close, so the count is compared against the workflows
      #    actually on disk — not merely asserted to be non-zero, because "it linted 1 of 6" is just
      #    as much a lie as "it linted 0".
      #
      # Both halves pinned, this reproduces EXACTLY on a laptop — which is the real prize, because it
      # stops the gate being something you can only find out about by pushing:
      #
      #   actionlint -shellcheck /path/to/shellcheck
      - name: Lint every workflow
        run: |
          set -euo pipefail
          shellcheck_bin="$RUNNER_TEMP/shellcheck"

          # ONE invocation, and the test and the reported version both come out of it — for the same
          # reason the lint below is run once: a version printed by a SECOND `--version` call is not,
          # strictly, evidence about the binary the first one approved.
          #
          # An explicit `if`, not `A && B || C` — which is not if-then-else, and which SC2015 rightly
          # flags. This job lints itself, so the check that the linter is present must survive the
          # linter.
          if ! shellcheck_version=$("$shellcheck_bin" --version 2>/dev/null); then
            echo "::error::the pinned shellcheck is missing or will not run. actionlint would SILENTLY" \
                 "skip every run: block and still exit 0 — a green over the shell it is here to read." \
                 "This is a RED, not a shrug."
            exit 1
          fi
          echo "$shellcheck_version" | sed -n 2p

          # ONE invocation, and the count and the verdict both come out of it. Linting twice — once to
          # count, once to judge — would mean the number reported here describes a DIFFERENT run from
          # the one that decided the merge, which is a strange thing for a job about not trusting
          # unexamined subjects to do.
          #
          # No file arguments: actionlint's own discovery walks .github/workflows and takes exactly
          # the *.yml/*.yaml in it — the same set `find` counts below. Passing a `.github/workflows/*`
          # glob instead would hand it every file in that directory, so the day someone drops a
          # README.md or a .gitkeep there, the two counts disagree and this gate goes red over
          # nothing. Same subject, derived the same way, or the comparison is theatre.
          #
          # -shellcheck takes the PINNED binary explicitly rather than letting actionlint find one on
          # PATH — which is the whole point of #261. The runner image ships its own; without this flag
          # that is the one that would run, and the pin above would be decoration.
          log="$RUNNER_TEMP/actionlint.log"
          rc=0
          "$RUNNER_TEMP/actionlint" -verbose -color -shellcheck "$shellcheck_bin" >"$log" 2>&1 || rc=$?
          cat "$log"

          # actionlint's own answer to "did the shell half actually run?", and it is the only direct
          # one there is. A shellcheck it cannot execute is not an error to actionlint — it prints this
          # line, drops the rule, and exits 0 over every `run:` block in the repo.
          #
          # ANCHORED TO COLUMN 0, and the shape of the anchor is load-bearing in BOTH directions.
          #
          # Not a bare substring: the log also carries the source snippets actionlint echoes back when
          # it reports an error, so a loose match would read this phrase out of a WORKFLOW — including,
          # one day, a step in this repo that discusses this very check — and go red claiming the pin
          # was broken. Echoed source always arrives behind a `N | ` gutter, never at column 0.
          #
          # But not `^verbose: ` either, tempting as it looks. actionlint lints files CONCURRENTLY and
          # its verbose writes INTERLEAVE: the same message appears as `verbose: Rule ...`, as
          # `verbose: verbose: Rule ...`, and as a bare `Rule ...` with the prefix lost to a racing
          # goroutine (all three observed in one run, #261). A guard that a race can silently defeat is
          # a green over unread shell — the exact defect this job exists to close — so the prefix is
          # optional and repeatable, and the anchor rests on the column, which no interleave moves.
          if grep -qE '^(verbose: )*Rule "shellcheck" was disabled' "$log"; then
            echo "::error::actionlint DISABLED its shellcheck rule — every run: block in this repo went" \
                 "unread and it would still have exited 0. The pin is broken, not the workflows."
            exit 1
          fi

          on_disk=$(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | wc -l)
          linted=$(sed -n 's/^verbose: Linting \([0-9]\{1,\}\) files$/\1/p' "$log")
          echo "workflows on disk: $on_disk · linted by actionlint: ${linted:-0}"

          # An explicit `if`, not `A && B || C` — which is not if-then-else, and which SC2015 rightly
          # flags. Suppressing a lint inside the job that introduces the linter would be a poor way to
          # start.
          if [ "${linted:-0}" != "$on_disk" ] || [ "$on_disk" -eq 0 ]; then
            echo "::error::actionlint examined ${linted:-0} of $on_disk workflow file(s). A lint that" \
                 "reports green over a subject it never read is the defect this job exists to close."
            exit 1
          fi

          exit "$rc"

      # ...and now the shell that is NOT in a `run:` block (#266).
      #
      # The step above is the only shellcheck this repo has ever run, and it reads `run:` blocks. So
      # `scripts/` — several hundred lines of bash that CI itself depends on, including the two
      # harnesses that decide whether the skill-refs gates work at all — was never read by any linter.
      #
      # The tell was already in the tree: those scripts carry `# shellcheck source=` pragmas, which
      # exist to CONFIGURE a run that never happened. That is the silent-no-op shape
      # (FS-GG/.github#416) turned inside out — not a gate reporting green over an unread subject, but
      # a subject that believes it is being read.
      #
      # Same pinned binary as the step above. No second download, and no second version to keep in
      # step: when the pin moves, both halves of this job move with it. That is the property #261
      # bought, and this step is its second customer.
      - name: Lint the repo's own shell
        run: |
          set -euo pipefail
          shellcheck_bin="$RUNNER_TEMP/shellcheck"

          # DISCOVERED, not listed. A hand-maintained file list is a thing that goes stale in silence,
          # and the failure it produces here is the one this job exists to prevent: a shell script the
          # gate has never heard of, merging unread, green. So the subject is derived the way a shell
          # file actually identifies itself — by extension, or by shebang. The shebang half is not
          # hypothetical: the repo's largest shell file, `scripts/fsgg-coord`, has no `.sh` on it.
          # NUL-delimited end to end. `git ls-files` without `-z` QUOTES any path that is unusual (a
          # newline, a non-ASCII byte), and a quoted path does not name a file — `[ -f "$f" ]` then
          # fails and the script is dropped from the subject in silence. An unread script is the exact
          # failure this step exists to prevent, so it does not get to arrive via the file list.
          mapfile -d '' -t discovered < <(
            {
              git ls-files -z -- '*.sh' '*.bash'
              git ls-files -z | while IFS= read -r -d '' f; do
                case "$f" in *.sh|*.bash) continue ;; esac
                [ -f "$f" ] || continue
                IFS= read -r first <"$f" || true
                if printf '%s\n' "$first" | grep -qE '^#!.*[ /](ba|da|k)?sh([[:space:]]|$)'; then
                  printf '%s\0' "$f"
                fi
              done
            } | sort -zu
          )

          # VENDORED, so not ours to lint. The coordination kit is SYNCED from FS-GG/.github (`chore:
          # sync coordination kit from FS-GG/.github@…`, #233/#252/#262). Linting it here would report
          # findings this repo cannot fix — the next sync reverts any local edit — and it would do it
          # LOUDLY and WRONGLY: four of its SC1010s are false positives (a `local` variable named
          # `done`, and `banner done …` as an argument; shellcheck sees the keyword, the shell does
          # not). A gate that goes red on day one over a file nobody here owns is the false-accusation
          # shape #238 taught this repo to refuse, and #261 just closed. Its four real-but-cosmetic
          # SC2155s were routed UPSTREAM instead, where they can actually be fixed.
          kit=(scripts/fsgg-coord)

          # An exclusion that names nothing excludes nothing — silently. If a future sync renames or
          # moves the kit, this list keeps "excluding" a path that is gone while the kit's real file
          # sails into the subject and reds the gate with the false positives above. So the exclusion
          # is checked as itself, exactly like the pinned binary and the file count are.
          for k in "${kit[@]}"; do
            if [ ! -f "$k" ]; then
              echo "::error::the excluded path '$k' is not in the tree. The coordination kit moved," \
                   "so this exclusion now excludes NOTHING and the kit is about to be linted as if" \
                   "this repo wrote it. Re-derive the exclusion; do not delete this check."
              exit 1
            fi
          done

          subject=()
          excluded_n=0
          for f in "${discovered[@]}"; do
            excluded=0
            for k in "${kit[@]}"; do
              if [ "$f" = "$k" ]; then excluded=1; fi
            done
            if [ "$excluded" -eq 0 ]; then subject+=("$f"); else excluded_n=$((excluded_n + 1)); fi
          done

          # The vendored count is the number of files actually WITHDRAWN from the discovered set, not
          # the length of the exclusion list. They differ the day the kit stops looking like shell (a
          # rewrite, a compiled binary): the path still exists, so the guard above passes, but it was
          # never discovered and so was never excluded from anything. Printing `${#kit[@]}` there would
          # produce an accounting line that does not add up — in a step whose entire claim is that its
          # subject count can be trusted.
          echo "shell in tree: ${#discovered[@]} · vendored (not linted): $excluded_n · linted: ${#subject[@]}"

          # Run over zero files, shellcheck exits 0 — and a green over an empty subject is precisely
          # the defect this job exists to close. If discovery ever returns nothing, that is a RED.
          #
          # (This comment does not begin with the linter's name, and neither does the one below. A
          # comment whose first word is that name is parsed as a shellcheck DIRECTIVE, not as prose —
          # SC1072/SC1073, and the run: block fails to parse. Caught by this very step, on itself.)
          if [ "${#subject[@]}" -eq 0 ]; then
            echo "::error::discovered no repo-authored shell to lint. shellcheck over nothing exits 0," \
                 "so this would have been a GREEN over an unread subject."
            exit 1
          fi

          # -x, so the `# shellcheck source=lib/test-harness.sh` pragmas the harnesses already carry
          # become live and shellcheck follows the source.
          #
          # And NO `-P`/`--source-path` here, deliberately. The scripts declare `source-path=SCRIPTDIR`
          # themselves, so `shellcheck -x <file>` resolves the source from ANY working directory — which
          # means the command below is the command a developer types, and this gate reproduces on a
          # laptop. Passing `-P` here instead would fix it for CI ONLY: a script that forgot the pragma
          # would pass the gate and fail on the desk of whoever ran shellcheck by hand, which is the
          # divergence the pinning in this job exists to kill.
          #
          # -S info, and DO NOT RAISE IT TO warning. The floor this gate enforces is `warning`, so
          # `-S warning` looks like the tidy-up this line is asking for — and it would silently break
          # the SC1091 guard below. SC1091 is an INFO. Raise the floor here and it stops appearing in
          # the log at all, the guard's `grep` stops matching, and an unfollowed `source` goes back to
          # being invisible. The floor is applied BELOW, where it can be applied to the findings
          # WITHOUT also applying it to the evidence that the findings are trustworthy: two verdicts
          # come out of this one log and they do not share a floor.
          log="$RUNNER_TEMP/shellcheck.log"
          rc=0
          "$shellcheck_bin" -x -S info -f gcc "${subject[@]}" >"$log" 2>&1 || rc=$?
          cat "$log"

          # rc 0 = clean, 1 = findings (judged below). Anything ELSE is shellcheck failing to PROCESS a
          # file — an unreadable path, a syntax error it cannot parse past — and a file that could not
          # be read is a file that was not checked.
          if [ "$rc" -ge 2 ]; then
            echo "::error::shellcheck exited $rc — it could not process one of the files above." \
                 "That file went unread; this is a RED, not a shrug."
            exit 1
          fi

          # THE SOURCE MUST ACTUALLY BE FOLLOWED, and this guard is the whole reason #266 was not a
          # two-line PR.
          #
          # `source=lib/test-harness.sh` resolves against the linter's source path. Get that wrong and
          # nothing fails — it emits SC1091 ("Not following: ...") and carries on with the harness
          # UNREAD. SC1091 is an `info`, so a `-S warning` floor never even prints it. What the
          # gate reports instead is a set of confident, WRONG SC2034s: every variable the suites set
          # for the harness to read (RC, consumed only by `expect_rc`) looks unused, because the reader
          # was never parsed. Three of them, and #266 filed them as real, suspecting the tests were not
          # checking the exit codes they thought they were. They were. The `source` was unread.
          #
          # So an unfollowed source is a RED in its own right, at its own floor. A linter running with
          # half its subject invisible does not get to report on the other half.
          if grep -q '\[SC1091\]' "$log"; then
            echo "::error::shellcheck could not follow a sourced file (SC1091, above). It linted the" \
                 "sourcing script with the source UNREAD — which invents SC2034s for every variable" \
                 "the sourced file consumes. Add '# shellcheck source-path=SCRIPTDIR' to the script."
            exit 1
          fi

          # THE FLOOR: warning. With the sources followed, the tree is clean here — no baseline, no
          # suppressions, nothing silenced to get to green.
          #
          # Below the floor sit 10 SC2016s ("expressions don't expand in single quotes"), and they are
          # correct-as-written, not debt: they are literal markdown code spans in test assertions
          # (`expect_has '### `path``') and `$1`/`$2` inside single-quoted awk programs. shellcheck
          # reads a backtick in single quotes as a command substitution; the shell does not. The same
          # code is already suppressed for the same reason in skill-refs-sweep.yml. They are PRINTED
          # above and not fixed, which is the honest state — not hidden behind a `disable` that would
          # also hide the next real one.
          blocking=$(grep -cE ': (error|warning):' "$log" || true)
          if [ "$blocking" -ne 0 ]; then
            echo "::error::shellcheck found $blocking finding(s) at or above 'warning' in the repo's" \
                 "own shell. See the gcc-format lines above: path:line:col."
            exit 1
          fi
          echo "shellcheck: clean at -S warning across ${#subject[@]} file(s)."

      # ...and now the THIRD place this repo keeps shell, which #135 created: inside a COMPOSITE
      # ACTION. Neither step above can see it — actionlint discovers `.github/workflows/*.yml` and
      # nothing else (handed an action.yml explicitly it rejects it as a malformed workflow), and the
      # scripts/ pass discovers shell by extension or shebang, which shell embedded in YAML has
      # neither of. So the cold restore's ~20 lines of bash — the code that decides whether every
      # other job in this file restores at all — would have merged unread, beneath two green lint
      # steps. Verified, not assumed: an unquoted `$NUGET_PACKAGES` planted in the action passes both
      # of them at exit 0.
      #
      # The subject, the counting, and the fail-closed reasoning live in the script, where a developer
      # can run them (`SHELLCHECK=<pinned> scripts/lint-action-shell.sh`) and where the step above
      # LINTS them — the same standard this job applies to every other line of shell in the repo, now
      # applied to the linter that reads the actions. scripts/test-lint-action-shell.sh drives it.
      #
      # Same pinned shellcheck as both steps above. No second download, no second version to keep in
      # step: when the pin moves, all three halves of this job move with it.
      - name: Lint the shell inside composite actions
        env:
          SHELLCHECK: ${{ runner.temp }}/shellcheck
        run: |
          set -euo pipefail
          python3 -c 'import yaml' 2>/dev/null || sudo apt-get install -y -qq python3-yaml
          scripts/lint-action-shell.sh

  # Tests for the composite-action linter in workflow-lint above (#135). It is the only thing standing
  # between a composite action's shell and an unread merge, and its dangerous failure is not going red
  # — it is finding NOTHING and reporting that in green. Every comparable gate in this repo was
  # required to have a behavioural suite for exactly that reason (#243 for check-skill-refs.sh, #251
  # for the sweep, #264 for the harness beneath them both), and the linter is no different: a gate
  # whose subject can silently empty out is one whose emptiness must itself be a tested case.
  #
  # Separate job = distinct signal, as everywhere in this file. A red HERE means the linter is not
  # trustworthy, which is a different fact from "an action has bad shell" — and if the linter is
  # broken, its verdict on the actions is worth nothing anyway.
  #
  # It stands on scripts/lib/test-harness.sh, which #259 extracted "before there is a third". This is
  # the third.
  #
  # Hermetic: fixture trees under mktemp, a real shellcheck, no token, no network, no gh.
  lint-action-shell-tests:
    name: Composite-action lint tests (scripts/lint-action-shell.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Behavioural test suite (fixture action in, exit code + subject claim out)
        run: |
          set -euo pipefail
          python3 -c 'import yaml' 2>/dev/null || sudo apt-get install -y -qq python3-yaml
          scripts/test-lint-action-shell.sh

  # Markdown-block typecheck gate (FS.GG.Game#141 for the skills, #148/#149 for the TestSpecs). The
  # three gates above validate everything about a published document EXCEPT its code: refs resolve,
  # digests match, cross-references resolve — and the `fsharp` blocks, the part a reader actually
  # copies into their product, were only ever READ. A document could ship an example that does not
  # compile and every check stayed green. That is the silent-no-op shape (FS-GG/.github#416) one level
  # up: a gate reporting success over a subject it never examined. The same defect was found five
  # times BY HAND (#129, #132, #140 ×2, #144) and zero times by CI.
  #
  # This job compiles every block in BOTH corpora against the REAL built FS.GG.Game.Core and reports a
  # type error against the markdown line the reader would copy from:
  #
  #   skills     template/product-skills/**/SKILL.md            — independent examples
  #   testspecs  docs/TestSpecs/Games/*.md + TestSpecTutorial.md — a CUMULATIVE model per document
  #
  # Blocks are sketches, so a fixture in scripts/<corpus>-block-context/<doc>.fs supplies the free
  # values; see the header of scripts/typecheck-md-blocks.fsx for the mechanisms (`module rec`,
  # `#line` directives, and — for the TestSpecs, whose `Model` block references types declared three
  # blocks earlier — cumulative opens).
  #
  # It ALSO enforces the label rule, and that is not decoration: a document that declares its own
  # `type Vec2 = { X: float; Y: float }` and uses it consistently TYPECHECKS PERFECTLY, so the
  # compiler alone would let #144 be reintroduced verbatim and stay green (verified). X/Y/Width/Height
  # are the labels of Scene's Point/Rect AND of the sim Point/Rect, so reusing them makes a bare
  # record literal resolve against the wrong one — a LABEL bug, not a type error. It is checked as
  # itself, textually, over every block including the skipped ones.
  #
  # ...and over every FIXTURE those blocks are compiled with (#171), which is the half that bites
  # hardest. A block declaring its own X/Y record at least states the collision in prose a reader can
  # see; a FIXTURE that hands the block an X/Y-labelled type teaches it to bind against the colliding
  # shape from OUTSIDE the document — so the block compiles perfectly, the markdown is spotless, and
  # the gate ticks green over the precise defect it exists to kill. Until #171 the lint read the
  # markdown and nothing else, and a fixture could do exactly that: verified, on this gate, at exit 0.
  #
  # The harness is fail-closed on ITSELF — no source files, no blocks, a parsed-block count that
  # disagrees with an independent fence count, or a missing FS.GG.Game.Core build are all hard
  # failures, because the one thing this job must never do is go green over code it never compiled.
  # Blocks it cannot reach (a handful are .fsi signature listings, elide their body with `...`, or are
  # RIGHT/WRONG contrasts that bind the same name twice by design) are SKIPPED with a written reason
  # and re-printed as a warning on every run, so they stay visible instead of quietly counting as
  # covered. The scene edge is NO LONGER among them: `Geometry.toPoint`/`toRect` were reconstructed by
  # #165 and, since #189, come from the REAL published fragment — see the scaffold-drift job below.
  #
  # A skill may teach a package this repo does not consume — fs-gg-audio binds FS.GG.Audio.*,
  # fs-gg-persistence binds FS.GG.UI.Canvas. Those blocks were unreachable, and so invisible to this
  # job, until #150: the skills corpus now declares them in `PackageRefs`, the generated project
  # takes a real PackageReference, and the block is typechecked against the assembly the READER
  # restores rather than a stub. Versions come from the gate-only group in
  # Directory.Packages.local.props (the harness reads the central pin and refuses to invent one), and
  # NO product project references any of them. This step therefore restores those packages from
  # nuget.org — all are dual-published, so no org-feed credential.
  md-block-typecheck:
    name: Markdown fsharp blocks typecheck (skills + TestSpecs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          # Cold by construction — see the gate job above.
          cache: false

      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      # The blocks are typechecked against the BUILT assembly, exactly as a product consumer binds to the
      # package — not against the source, and never against a stub. The harness refuses to run if this
      # step did not produce FS.GG.Game.Core.dll.
      - name: Build FS.GG.Game.Core (the assembly the blocks are typechecked against)
        run: dotnet build src/Game.Core/FS.GG.Game.Core.fsproj -c Debug --no-restore

      - name: Typecheck every ```fsharp block in the skills and the TestSpecs
        run: |
          set -euo pipefail
          if ! dotnet fsi scripts/typecheck-md-blocks.fsx; then
            echo "::error::a \`\`\`fsharp block in a published SKILL.md or TestSpec does not typecheck against FS.GG.Game.Core, or breaks the X/Y/Width/Height label rule — or a FIXTURE in scripts/*-block-context/ breaks that rule, which is the worse case: the block it feeds binds against the colliding shape and compiles perfectly clean (#171). The annotations above name the file at fault, which may be the fixture rather than the markdown. Readers copy these blocks verbatim into their product, so a block that cannot compile is a defect in the document, not in this gate. Reproduce locally with: dotnet build src/Game.Core/FS.GG.Game.Core.fsproj -c Debug && dotnet fsi scripts/typecheck-md-blocks.fsx"
            exit 1
          fi

  # Scaffold-drift gate (FS.GG.Game#189, answering FS.GG.Rendering#570). Separate job = distinct
  # signal: this one says "the context the md-block gate compiles against is not the context the
  # reader's product ships", which is a different failure from "a block does not compile".
  #
  # scripts/skill-block-context/_scaffold.fs is GENERATED — copied verbatim out of the published
  # FS.GG.UI.Template package (content/template/fragments/vec2/src/Product/Vec2.fs), which is where a
  # scaffolded product's real `Geometry.Vec2` comes from. It used to be a hand-written TWIN of that
  # type, and the twin was the sharpest instance of the very defect this whole workflow exists to
  # kill: a reconstruction keeps compiling after the real type moves under it, so a rename of `Vx` in
  # FS.GG.Rendering left the md-block gate GREEN over skills teaching a shape the scaffold no longer
  # shipped. Nothing anywhere would have gone red. (Verified: rename `Vx` in the generated file today
  # and the md-block job fails, naming `AppRoot.Geometry.Vec2` and the label.)
  #
  # This job re-derives the file from the pinned package and fails unless the committed copy matches it
  # exactly, which closes the three ways the generated copy can go wrong: someone hand-edits it, someone
  # bumps the FS.GG.UI.Template pin in Directory.Packages.local.props without regenerating, or someone
  # DELETES it. It does NOT chase new upstream releases — the pin is deliberate, and moving it is a
  # reviewed decision (it must stay on the same Rendering release train as FS.GG.UI.Scene, since the
  # fragment's `toPoint`/`toRect` return Scene's types; Directory.Packages.local.props says so).
  #
  # `--check` rather than the regenerate-then-`git diff --exit-code` shape used by surface-baseline-drift
  # above, and the difference is load-bearing: `git diff` is blind to UNTRACKED files, so a committed
  # DELETION of _scaffold.fs would be silently recreated by the generator and the diff would come back
  # empty — the job reporting green over a scaffold that is not in the repo. Verified before it was
  # written that way. `--check` compares the generated bytes against the committed file and treats
  # "missing" as the mismatch it is. A gate green over a subject it never examined (FS-GG/.github#416)
  # is the exact defect this scaffold work removes; the guard on it must not reintroduce it one level up.
  #
  # No locked restore and no repo build: the generator `PackageDownload`s the template into a temp
  # folder behind an empty Directory.Build.props, so it touches neither the project graph nor any
  # packages.lock.json. FS.GG.UI.Template is dual-published to nuget.org, so no org-feed credential.
  scaffold-drift:
    name: Scaffold drift (_scaffold.fs == published template geometry)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: _scaffold.fs == the pinned FS.GG.UI.Template's published geometry
        run: |
          set -euo pipefail
          if ! dotnet fsi scripts/generate-scaffold-context.fsx --check; then
            echo "::error::scripts/skill-block-context/_scaffold.fs is not what the pinned FS.GG.UI.Template ships. It is a GENERATED file — do not hand-edit it. If you bumped the FS.GG.UI.Template pin in Directory.Packages.local.props, regenerate and commit: dotnet fsi scripts/generate-scaffold-context.fsx. If you meant to change the GEOMETRY, change it in FS.GG.Rendering — the scaffold is theirs, and every scaffolded product gets it from there."
            exit 1
          fi
