name: release

# Release-only publish for FS.GG.Game (ADR-0022 / P5). Tag-triggered; NEVER a required check and
# NEVER on push/PR (mirrors the sibling repos' release cadence). Publishes the coherent set
# FS.GG.Game.Core + FS.GG.Game.Render + FS.GG.Game.Harness to the org GitHub Packages feed
# (nuget.pkg.github.com/FS-GG), then dual-publishes the BYTE-IDENTICAL set to public nuget.org via
# Trusted Publishing / OIDC (ADR-0012 §1–§5 / ADR-0013 — no stored key). Gated on a full headless
# build+test first: a set is published only after `verify` is green (publish-before-flip, FR-007).
#
# The set shares ONE version (the repo-wide <Version> in Directory.Build.local.props); the packages
# move together, so every release re-publishes all three at the same version. Game.Render depends on
# Game.Core@same-version + FS.GG.UI.Scene (itself dual-published, ADR-0012/0013); Game.Harness
# depends on Game.Core@same-version + the BCL only (WI-6, Game#425). FS.GG.Game.Harness joined the
# set at 0.6.0 — it is packable and in the slnx as of #423 but landed after the v0.5.1 release, so no
# published version predates 0.6.0 for it.
on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pack+publish (e.g. 0.1.0-preview.1). Required to actually push on a manual run; omit for a pack-only dry run."
        type: string
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Release-only gate: re-run the deterministic headless build+test at the tagged commit (gate.yml
  # runs on push/PR to main, not on tags). publish-packages `needs:` this — a red suite SKIPS the
  # push, which is the safety net, not a nuisance.
  verify:
    name: Verify (locked restore + headless build + test)
    runs-on: ubuntu-latest
    # Restrict to the canonical repo: fork tags/dispatch never run this (no fork secret exposure).
    if: github.repository == 'FS-GG/FS.GG.Game'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: '10.0.x'

      # COLD, via the shared action (#135 / FS-GG/.github#429) — and this is the job where a warm
      # restore was worst. There is no `cache: true` here to blame: --locked-mode validates the
      # committed contentHash against whatever copy of the package is already in the global-packages
      # folder, and on a GitHub runner that folder is PRE-SEEDED BY THE IMAGE. So this restore never
      # had to contact the feed either, and `publish-packages` needs: this job — meaning the one gate
      # standing between a lock file no fresh clone can restore and a PUBLISHED, dual-published,
      # immutable package was comparing a record against a record.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      - name: Build (net10.0, Debug)
        run: dotnet build FS.GG.Game.slnx -c Debug --no-restore
      - name: Test (full headless suite)
        run: dotnet test FS.GG.Game.slnx -c Debug --no-restore

  publish-packages:
    name: Publish FS.GG.Game.* (org feed + nuget.org, release-only)
    runs-on: ubuntu-latest
    if: github.repository == 'FS-GG/FS.GG.Game'
    needs: [verify]
    permissions:
      contents: read
      packages: write
      id-token: write   # ADR-0013: mint the GitHub OIDC token for nuget.org Trusted Publishing
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from the release tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)           raw="${{ github.event.release.tag_name }}" ;;
            push)              raw="${GITHUB_REF_NAME}" ;;
            workflow_dispatch) raw="${{ inputs.version }}" ;;
            *)                 raw="" ;;
          esac
          ver="${raw#v}"   # v0.1.0-preview.1 -> 0.1.0-preview.1
          if [[ -z "$ver" ]]; then
            echo "::notice::No version (manual run without input) — pack-only dry run, no push."
            echo "push=false" >> "$GITHUB_OUTPUT"
            ver="0.0.0-dryrun.${GITHUB_RUN_ID}"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Release version: $ver"

      # The tag is the release trigger; Directory.Build.local.props <Version> is the version-of-truth
      # the packages actually carry. They MUST agree, else the tag advertises a version the packed
      # bytes don't match. Fail loud on a mismatch (bump the props in the same release PR).
      - name: Guard — tag version == repo version-of-truth
        if: steps.ver.outputs.push == 'true'
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          truth="$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.local.props)"
          [[ -n "$truth" ]] || { echo "::error::<Version> not found in Directory.Build.local.props"; exit 1; }
          if [[ "$truth" != "$VER" ]]; then
            echo "::error::tag version ($VER) != Directory.Build.local.props <Version> ($truth). Bump the version-of-truth to match the tag in the release PR."
            exit 1
          fi
          echo "Version-of-truth matches the tag: $VER"

      # The BYTES THAT GET PUBLISHED are restored here, so this restore is cold too. It carried no
      # --locked-mode flag, which made it look like a plain build prerequisite; it was not. The
      # org-shared Directory.Build.props sets RestoreLockedMode for EVERY restore in CI
      # (GITHUB_ACTIONS=true + a lockfile exists), so this was a locked restore against the image's
      # pre-seeded package folder, exactly like the one in `verify` — just harder to see, because the
      # flag that would have told you was implicit.
      - name: Restore (locked, cold)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.Game.slnx

      # Pack the coherent set. FS.GG.Game.Core, FS.GG.Game.Render and FS.GG.Game.Harness are
      # IsPackable=true (the three test projects are IsPackable=false), so packing the whole slnx
      # yields exactly those three packages, all at $VER — and each ProjectReference to Game.Core
      # (Render's and Harness's) is emitted as a package dependency at the same $VER (coherent set).
      #
      # `dotnet pack` restores implicitly, and that is left alone deliberately: it re-resolves with
      # -p:Version set, which is how the packed nuspec gets the right dependency version. It now
      # resolves into the COLD NUGET_PACKAGES the step above exported to GITHUB_ENV, so it validates
      # against the same feed-backed folder rather than the image's.
      - name: Pack FS.GG.Game.* (coherent set @ $VER)
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          dotnet pack FS.GG.Game.slnx -c Release -p:Version="$VER" -o artifacts/packages
          echo "Packed:"; ls -1 artifacts/packages/*.nupkg

      - name: Push coherent set to nuget.pkg.github.com/FS-GG
        if: steps.ver.outputs.push == 'true'
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://nuget.pkg.github.com/FS-GG/index.json \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
          echo "Published FS.GG.Game.* ${{ steps.ver.outputs.version }} to the org feed."

      # Dual-publish the BYTE-IDENTICAL set to public nuget.org (ADR-0012 §1–§5) via Trusted Publishing
      # / OIDC (ADR-0013 — no stored key). Runs AFTER the org-feed push (gated ordering, ADR-0012 §4):
      # if that step fails the job stops before this one. NuGet/login mints a single-use key from the
      # org's Trusted Publishing policy for THIS repo (Repository FS.GG.Game, Workflow File release.yml);
      # until that policy exists it 401s and fails the release loud. Same artifacts — no re-pack (§3).
      - name: NuGet login (OIDC → short-lived nuget.org key)
        if: steps.ver.outputs.push == 'true'
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER || 'Paradigma11' }}
      - name: Push coherent set to nuget.org (public)
        if: steps.ver.outputs.push == 'true'
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
          echo "Published FS.GG.Game.* ${{ steps.ver.outputs.version }} to nuget.org."
