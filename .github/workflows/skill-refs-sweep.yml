name: skill-refs sweep

# The FULL issue/PR-link sweep over every published skill body — the half of check-skill-refs that is
# f(tree, WORLD) rather than f(tree). It is here, on a schedule, and NOT on the per-PR `gate`
# workflow, and that split is the whole point (FS.GG.Game#238; the script's § 4 carries the argument).
#
# WHY IT IS NOT A MERGE GATE. A link's state moves on its own. FS-GG/FS.GG.Rendering#494 closed at
# 14:43:32Z and `main`@e4c07c2 — green at 14:35:30Z, and unchanged since — failed from that minute on.
# Nothing in this repo changed. As a required check that is a false accusation: it reddens whoever
# happens to have a PR open, and worse, the only edit that clears it is in a skill body their item
# never declared in its `Paths:` — so under ADR-0021/0027 they cannot even fix it without widening
# onto a file they have no business touching. A merge gate may only demand a change inside the diff
# it gates; this check cannot promise that, so it does not gate.
#
# WHY IT STILL EXISTS. Because scoping the gate to the diff, on its own, would leave every link in an
# unchanged body resolved by NOBODY — a gate green over a subject it never examined, which is the
# exact FS-GG/.github#416 shape check-skill-refs was written to close, reintroduced by its own fix.
# So the subject is still swept in full, daily. The two changes are one change: neither is correct
# alone, and deleting this workflow silently guts the gate rather than merely removing a job.
#
# WHERE A RED GOES (FS.GG.Game#242). Non-blocking was the right call; SILENT was not, and for a while
# this workflow was both. A failing SCHEDULED run notifies almost nobody — GitHub mails whoever last
# touched the workflow file, and only if they have Actions notifications on. No PR, no reviewer, no
# blocked merge, nothing in a human's path. So the honest description of the old steady state was: a
# red sweep sitting unread in the Actions tab while everyone's PRs are green — the links effectively
# unchecked, which is the #416 shape one level up, moved rather than removed.
#
# So the sweep FILES ITS FINDING where this org already looks: an issue — rewritten in place on every
# run, REOPENED rather than duplicated, and CLOSED again by the run that shows the condition is over.
# That turns decay from a notification nobody gets into a work item somebody can pick up — it even
# carries a `Paths:` line so it is schedulable under ADR-0021/0027 the moment someone puts it on the
# board.
#
# WHICH red goes WHERE (FS.GG.Game#277). There are TWO of those issues, because a red sweep has two
# utterly different causes and this workflow must not call either by the other's name:
#
#   `skill-refs-decay` — a pointer we published stopped resolving. A fact about the TREE. Real work,
#       well-specified, somebody's item.
#   `skill-refs-infra` — the sweep never judged a pointer at all: a bad token, an exhausted budget, a
#       link the API would not return. A fact about the SWEEP. Nothing decayed; nothing was LOOKED at.
#
# They were once the same issue, and an infra blip therefore REOPENED the decay tracker and announced
# a regression that had not happened — on the one path here that deliberately notifies. `reconcile`
# now branches on `steps.sweep.outputs.reported`, which is exactly the bit that tells them apart, and
# an infra failure leaves the decay tracker strictly alone: a run that judged nothing is evidence
# neither that decay appeared nor that it went away.
#
# The fix is still the one the script names — repoint the link at live work, or, if it is cited as
# history (which a closed issue usually is), mark it:
#
#     <!-- skill-refs: closed-ok FS-GG/FS.GG.Rendering#494 — why -->
#
# AND IT IS STILL NOT A GATE. Filing an issue is how the finding reaches a human; it is not an
# escalation, and nothing here blocks a merge. Do not "fix" a noisy sweep by making it required —
# that reintroduces FS.GG.Game#238 verbatim, demanding a fix in a file the blocked PR never declared.
# A signal that cannot block is information. The same signal wired to block is a false accusation.
#
# Authorship-time strictness is untouched and lives where it belongs: a PR that TOUCHES a skill still
# resolves that skill's links, blocking, in `gate`. Every rot this check was written for is
# introduced by such a diff. This job catches only the decay that no diff can be blamed for.
on:
  schedule:
    # 07:00 UTC daily. Decay is not urgent — an issue that closed overnight is not on fire — and a
    # slower cadence keeps this a signal people trust rather than noise they mute.
    - cron: '0 7 * * *'
  workflow_dispatch:
  # The sweep is itself code, and a change to it must be checked BY it — otherwise its first real run
  # is post-merge, on a schedule nobody is watching, and a typo here disables the load-bearing half of
  # the gate SILENTLY. That is the #416 shape at the top level: the check that makes the scoped gate
  # honest, quietly checking nothing. Same for the script it drives.
  #
  # AND YES, THIS ONE RUN IS A FULL SWEEP ON A PR — the exact shape the rest of this file exists to
  # abolish, so it is deliberate and narrow rather than an oversight. Two things make it affordable,
  # and both must stay true: it is NOT a required check (a decay cannot block the merge, it can only
  # inform it), and it fires ONLY on a PR that edits skill-refs itself — whose author is, by
  # construction, the one person already holding this machinery in their head and the right reader for
  # "a citation has rotted". If it ever becomes required, this trigger must go: a signal that cannot
  # block is information, and the same signal wired to block is the false accusation #238 removed.
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/skill-refs-sweep.yml'
      - 'scripts/check-skill-refs.sh'
  # AND ON THE MERGE THAT FIXES THE DECAY. Exactly one thing retires the tracking issue below — a
  # green sweep — so without this trigger the only thing that ever closes it is the 07:00 cron, and a
  # decay fixed at 10:52 leaves the issue open, red, and ASSERTING A DECAY THAT NO LONGER EXISTS until
  # the next morning. Up to ~21 hours of a lie.
  #
  # That is not merely untidy, and the issue's own wording is why: it advertises the finding as "small,
  # well-specified, unblocked" work. That is exactly what makes it the most attractive item on the
  # board — `take` will hand it to the next worker who asks — so a STALE one does not sit quietly, it
  # gets picked up. The worker claims it, cuts a worktree, reproduces the gate, and finds it green.
  # FS.GG.Game#268 did precisely this: filed 10:18Z, fixed at 10:52Z by FS.GG.Game#271, still open and
  # still being claimed two hours later. The cost of a late close is a worker's item, not a stale row.
  #
  # THE CRON STAYS, and is still the only thing that catches what this trigger structurally cannot: a
  # citation that rots — or heals — because the WORLD moved. An upstream issue closing or reopening
  # changes no file here and pushes nothing, so `push` never fires for it. The two are one mechanism:
  # `push` closes the tracker promptly when the TREE is the fix; `schedule` is what notices when the
  # tree never changes at all. Deleting either leaves a class of decay unresolved by anybody.
  #
  # AND IT IS STILL NOT A MERGE GATE (FS.GG.Game#238). It runs AFTER the merge, on `main`. It cannot
  # block a PR, and must never be made to.
  #
  # It CAN go red on a `main` commit — the `Verdict` step re-raises the sweep's rc, and that is the
  # point: a red nobody can see is the #242 defect.
  #
  # It does not, however, make the red land on an innocent author for the first time — which is the
  # objection to look for here, given #237. A SCHEDULED run already attaches its check to whatever
  # commit happens to be `main`'s HEAD at 07:00, and that commit is somebody's merge. So decay has
  # always reddened a commit that did not cause it; `push` changes WHEN that happens, not WHETHER, and
  # it picks a strictly more related commit (one that touched a skill) than the cron's arbitrary HEAD.
  #
  # Nor can a push run be the first to discover decay a diff introduced: `gate` already resolves the
  # links of any skill a PR touches, blocking, at authorship time. So what a push run finds is only
  # ever decay the WORLD caused — exactly what this workflow is for, and what #238 moved off the gate
  # rather than out of sight.
  #
  # What it buys, in both directions, is timeliness: red sooner when decay lands, and — the reason this
  # trigger exists — GREEN-AND-CLOSED sooner when the fix does.
  push:
    branches: [main]
    paths:
      - 'template/product-skills/**'              # the subject: every published skill body
      - 'scripts/check-skill-refs.sh'             # the judge — a change here can flip a verdict
      - '.github/workflows/skill-refs-sweep.yml'  # and the sweep itself: the PR run above is a DRY
                                                  # RUN, so this is its first real reconcile.

concurrency:
  # Never cancel a WRITING sweep in flight — scheduled, dispatched, or `push`. The reconcile step below
  # is a read-modify-write of the shared tracking issues, and a half-run that is killed between
  # "render" and "reconcile" leaves one asserting a state that is no longer the truth. PR runs are
  # still cancellable — they only ever render, never write.
  #
  # There are TWO of those issues now (FS.GG.Game#277), which widens the window rather than changing
  # the argument: a run killed BETWEEN the two trackers it reconciles has written one and not the
  # other, and the pair is then incoherent — "the sweep could not run" left open beside a decay report
  # that only a completed sweep could have produced.
  #
  # This is why the condition below is `== 'pull_request'` and not `!= 'schedule'`: every non-PR event
  # writes, so every non-PR event must be uncancellable. `push` (FS.GG.Game#275) relies on that, and a
  # future trigger will too. Narrowing this to name one event would silently re-arm the race.
  #
  # A push and the cron share one group (both resolve `github.ref` to `refs/heads/main`), so they
  # serialise against each other rather than racing the issue write. That is the intent, not a
  # coincidence to be tidied away.
  group: skill-refs-sweep-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  # For the tracking issue. Note the sweep NEVER writes on a `pull_request` run (see `reconcile`), so
  # this grant is unused there — and on a fork PR the token is read-only regardless.
  issues: write

env:
  # TWO trackers, because a red sweep has two utterly different causes and `reconcile` must never call
  # one of them by the other's name (FS.GG.Game#277).
  #
  # DECAY — a pointer we published stopped resolving. A fact about the TREE.
  DECAY_LABEL: skill-refs-decay
  DECAY_TITLE: "[skill-refs] A published skill points at something that no longer resolves"
  # INFRA — the sweep never judged a pointer, so the tree came out UNCHECKED. A fact about the SWEEP,
  # and a strictly different one: it says nothing whatever about decay. Its own label and its own
  # title are what stop it masquerading as — or clobbering — the decay tracker.
  INFRA_LABEL: skill-refs-infra
  INFRA_TITLE: "[skill-refs] The sweep could not run — the published pointers are UNCHECKED"

jobs:
  sweep:
    name: Skill-ref link sweep (whole tree)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # No --changed: this is the full sweep, and it is the ONLY run that resolves every link in the
      # tree. GH_TOKEN buys the 1,000/hr authenticated REST budget instead of a shared-IP 60/hr; the
      # links are public repos and no GraphQL is spent. The script REFUSES to self-skip in CI — a link
      # it cannot read is one it will not call green.
      #
      # The step does NOT fail here; `verdict` (last step) re-raises. Everything between the two needs
      # to run on the red path — that is the whole point of this workflow — and a step that dies takes
      # its successors with it unless every one of them says `if: always()`, which is a footgun waiting
      # for the next person to add a step and forget. The exit code is carried, not discarded.
      - name: "Resolve every issue/PR link in every published skill"
        id: sweep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          rc=0
          scripts/check-skill-refs.sh >"$RUNNER_TEMP/sweep.out" 2>"$RUNNER_TEMP/sweep.err" || rc=$?

          # Replay both streams into the log — stdout carries the ::error annotations, so re-emitting
          # it here is what puts them on the run.
          cat "$RUNNER_TEMP/sweep.out"
          cat "$RUNNER_TEMP/sweep.err" >&2

          # The script's findings are its stderr lines of the form `path:line: message` (its `report`
          # function; every § emits through it). Anything else on stderr is a banner or a NOTE. This
          # line format is the one contract this workflow has with the script — it is also the one a
          # human reads, which is what makes it the safe one to depend on.
          grep -E '^[^ :]+:[0-9]+: ' "$RUNNER_TEMP/sweep.err" \
            | sort -t: -k1,1 -k2,2n > "$RUNNER_TEMP/findings.txt" || true

          n=$(wc -l < "$RUNNER_TEMP/findings.txt" | tr -d ' ')

          # AND HERE IS THE CHECK ON THAT CONTRACT. The script prints this banner if, and only if, it
          # called `report` at least once — so "banner, but nothing parsed" means the format drifted
          # and this workflow can no longer read the findings it is built to file.
          #
          # Without this, that drift degrades into a LIE rather than an error: 0 parsed findings looks
          # exactly like an infra failure, so the sweep would file "could not complete — links
          # UNCHECKED" over a run that completed fine and found real decay, and point the fixer at the
          # wrong files. A check that misreports its own subject is the thing this workflow exists to
          # stop; it does not get to do it to itself.
          banner=false
          grep -qF 'every pointer in a published skill must resolve' "$RUNNER_TEMP/sweep.err" && banner=true

          {
            echo "rc=$rc"
            echo "findings=$n"
            echo "reported=$banner"
          } >> "$GITHUB_OUTPUT"
          echo "sweep: rc=$rc, $n finding(s), script-reported=$banner"

      # Render the issue body. This runs on EVERY trigger, including `pull_request` — that is
      # deliberate. The renderer is the part most likely to carry a typo, and a PR that changes this
      # workflow must exercise it. On a PR it renders to the step summary and stops; only a scheduled
      # or dispatched run is allowed to touch the API (see `reconcile`).
      - name: Render the finding
        id: render
        if: steps.sweep.outputs.rc != '0'
        env:
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FINDINGS: ${{ steps.sweep.outputs.findings }}
          REPORTED: ${{ steps.sweep.outputs.reported }}
          DRY_RUN: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          body="$RUNNER_TEMP/body.md"
          # If the sweep step died before it wrote these, treat it as "no findings" — which renders the
          # "could not complete" body below, and that is exactly what happened.
          : "${FINDINGS:=0}"
          : "${REPORTED:=false}"
          touch "$RUNNER_TEMP/findings.txt" "$RUNNER_TEMP/sweep.err"

          {
            echo "<!-- Managed by .github/workflows/skill-refs-sweep.yml. Rewritten on every sweep;"
            echo "     closed automatically when the sweep next goes green. Edit the SKILLS, not this. -->"
            echo
          } > "$body"

          if [ "$FINDINGS" -eq 0 ]; then
            # Red with nothing parsed. Two very different causes, and calling one of them by the
            # other's name is the failure this whole workflow is about — so they get separate bodies.
            {
              if [ "$REPORTED" = "true" ]; then
                # The script DID report pointers; this workflow could not read them. Its one contract —
                # the `path:line: message` line — has drifted, and the parser in the sweep step is now
                # blind. The decay is real and is NOT listed below, because we cannot list it.
                echo "## The sweep found decay — and this workflow could not read it"
                echo
                echo "\`check-skill-refs.sh\` reported at least one bad pointer (it printed its \`FAILED\` banner),"
                echo "but the sweep workflow parsed **zero** findings out of it. That means the one contract"
                echo "between them — the \`path:line: message\` line that \`report()\` emits — has changed, and the"
                echo "\`grep\` in \`.github/workflows/skill-refs-sweep.yml\` no longer matches it."
                echo
                echo "**The decay is real, and it is not listed here, because this workflow cannot see it.**"
                echo "Run \`scripts/check-skill-refs.sh\` locally to read the findings, then repair the parser so"
                echo "the next sweep can file them itself."
              else
                # The script never got as far as judging a pointer. Wrong token, exhausted budget, an
                # unreadable link, a bug in the script. This matters as much as decay does and is easier
                # to miss: the links came out UNCHECKED, and an unchecked link called green is precisely
                # the #416 defect the sweep exists to prevent. So it gets the same issue.
                echo "## The sweep could not complete — the links are UNCHECKED"
                echo
                echo "\`check-skill-refs.sh\` exited non-zero **without judging a single pointer**, so this is not"
                echo "decay: the sweep itself failed to run. Nothing was verified. Until it runs clean, every"
                echo "issue/PR link published in a product skill is unchecked — which is the exact"
                echo "\`FS-GG/.github#416\` shape (a green over an unread subject) that this sweep exists to close."
                echo
                echo "Usual causes: no authenticated \`gh\` in the job, an exhausted REST budget, or a link the"
                echo "API would not return after 3 tries. The script refuses to self-skip in CI, by design."
              fi
              echo
              echo "<details><summary>Last 40 lines of the run</summary>"
              echo
              echo '```'
              tail -n 40 "$RUNNER_TEMP/sweep.err" | sed 's/```/ʼʼʼ/g'
              echo '```'
              echo
              echo "</details>"
              echo
              echo "Paths: .github/workflows/skill-refs-sweep.yml scripts/check-skill-refs.sh"
            } >> "$body"
          else
            {
              echo "The daily skill-refs sweep is **red**: a pointer published in a product skill no longer"
              echo "resolves."
              echo
              echo "**Nobody's commit did this.** The world moved under a citation we published — an issue we"
              echo "point at closed, reopened, or vanished. That is why the sweep does not gate a merge"
              echo "(\`FS.GG.Game#238\`), and why it files this instead: a decayed citation is a small,"
              echo "well-specified, unblocked piece of work, not a broken build."
              echo
              echo "Swept [\`${SHA:0:7}\`]($SERVER/$REPO/commit/$SHA) · [run]($RUN_URL) · **$FINDINGS finding(s)**"
              echo
              echo "## Findings"
            } >> "$body"

            cur=""
            # shellcheck disable=SC2016
            #
            # SC2016 ("expressions don't expand in single quotes") is a FALSE POSITIVE on both printf
            # formats below. They are single-quoted because they are Markdown, and the BACKTICKS in
            # them are literal code-span delimiters — which shellcheck reads as a command
            # substitution you forgot to let expand.
            #
            # The span is load-bearing, not decoration: it is what stops GitHub swallowing the
            # `<!-- skill-refs: closed-ok … -->` marker that IS the fix, and what stops the bare `#N`s
            # autolinking onto unrelated issues. Double-quoting these formats to silence the lint
            # would break the thing the span exists for — and scripts/test-skill-refs-sweep.sh § 2
            # asserts the span, so it would fail there too.
            #
            # Scoped to this loop (the directive binds to the next command, and both offenders are
            # inside it) and to SC2016 alone — SC2086 and the rest still gate this script.
            while IFS= read -r ln; do
              f=${ln%%:*}; rest=${ln#*:}
              n=${rest%%:*}; msg=${rest#*: }
              if [ "$f" != "$cur" ]; then
                printf '\n### `%s`\n\n' "$f" >> "$body"
                cur="$f"
              fi
              # The message goes in a code span, and that is not cosmetic. It carries the literal
              # `<!-- skill-refs: closed-ok … -->` marker that IS the fix — rendered raw, GitHub would
              # swallow it as an HTML comment and the reader would be told to write nothing. It also
              # carries bare `#N`s, which raw would autolink and spam a cross-reference onto whatever
              # unrelated issue happens to hold that number.
              printf -- '- [L%s](%s/%s/blob/%s/%s#L%s) — `%s`\n' \
                "$n" "$SERVER" "$REPO" "$SHA" "$f" "$n" "$(printf '%s' "$msg" | tr '`' "'")" >> "$body"
            done < "$RUNNER_TEMP/findings.txt"

            {
              echo
              echo "## Fixing it"
              echo
              echo "Each finding above names its own fix. In short:"
              echo
              echo "- **stale link** — the issue closed. Repoint it at live work, or, if it is cited as history"
              echo "  (which a closed issue usually is), excuse it in place with the marker the finding prints."
              echo "- **dangling / unresolvable link** — the target does not exist, or the API would not return"
              echo "  it. Fix the reference."
              echo "- **stale marker** — an excuse that excuses nothing: the sentence it guarded was rewritten,"
              echo "  or the issue reopened. Drop it."
              echo "- **\`[[ref]]\` or bare \`#N\`** — these checks are *hermetic*: they do not depend on the world,"
              echo "  so \`gate\` is red on them for every PR too. A finding of this kind is a **gate regression on"
              echo "  \`main\`**, not decay — it is more urgent than the rest of this issue, not less."
              echo
              echo "Reproduce locally with \`scripts/check-skill-refs.sh\`."
              echo
              echo "---"
              echo
              echo "*This issue is written by the sweep: its body is rewritten on every run, and it closes itself"
              echo "when the sweep next goes green. Edit the skills, not this issue.*"
              echo

              # A finding filed without a touch-set is a finding nobody can pick up: `take`/`batch` refuse
              # an item whose `Paths:` cannot be proven disjoint from a live claim, so it lands on the
              # board LOOKING like work and is invisible to every worker who asks for work
              # (FS-GG/.github#442). The sweep knows exactly which files it is asking someone to edit, so
              # it declares them. It cannot place the item on the board itself — that is Projects v2, and
              # GITHUB_TOKEN has no project scope — but the moment a human adds it, it is schedulable.
              printf 'Paths:'
              cut -d: -f1 "$RUNNER_TEMP/findings.txt" | sort -u | sed 's/^/ /' | tr -d '\n'
              echo
            } >> "$body"
          fi

          {
            echo "### Rendered tracking issue"
            echo
            if [ "$DRY_RUN" = "true" ]; then
              echo "> **Dry run.** This is a \`pull_request\` run, so nothing was filed — you are already"
              echo "> looking at the red check, and filing an issue at you would be the noise that gets this"
              echo "> muted. What follows is the body a *scheduled* run would have written."
              echo
            fi
            cat "$body"
          } >> "$GITHUB_STEP_SUMMARY"

      # The API half. Scheduled and dispatched runs only.
      #
      # A `pull_request` run must NOT write. Two reasons, and either alone is enough: the PR author is
      # already looking at this red check — filing an issue at them is the noise that gets a signal
      # muted — and a fork PR's token is read-only anyway, so the write would simply fail. The render
      # above still ran, so the PR does exercise the interesting half.
      - name: Reconcile the tracking issue
        id: reconcile
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          RC: ${{ steps.sweep.outputs.rc }}
          # The bit that says WHICH red this is. The render step has always branched on it to pick the
          # body; before FS.GG.Game#277 this step ignored it and filed both to the decay tracker.
          REPORTED: ${{ steps.sweep.outputs.reported }}
        run: |
          set -euo pipefail

          # REST throughout. It is the cheap budget, it is the one that is still up when GraphQL is
          # gone, and `gh issue create|edit|close` are all GraphQL (FS-GG/.github#587).

          # ── one lookup, one raise, one resolve — parameterised by label ──────────────────────────
          #
          # There are two trackers now, and they are read and written by the SAME three functions. That
          # is deliberate: every parameter on the lookup below is load-bearing, and a second, hand-copied
          # lookup for the infra tracker would be a second chance to get `-X GET` wrong — which is the
          # bug FS.GG.Game#249 actually shipped a fix for.

          # `-X GET` IS LOAD-BEARING. `gh api` defaults to POST the moment any `-f` is present, so
          # without it this "read" POSTs to /issues — the CREATE-ISSUE endpoint — and the daily sweep
          # opens a blank issue instead of finding the tracker. It fails 422 today only because
          # `title` is missing; it is one field away from being a silent issue factory.
          #
          # --paginate, because a truncated read here does not look truncated — it looks like "no
          # tracking issue exists", and the sweep would then file a SECOND tracker every day
          # (FS-GG/.github#547). `--slurp` cannot be combined with `--jq`, so aggregate in a separate
          # `jq`. `/issues` returns PRs too; filter them out. Oldest-first, so the ORIGINAL tracker
          # stays the tracker even if a duplicate ever gets made by hand.
          find_tracker() {   # <label> → "<number> <state>", or blank when there is none
            gh api -X GET "repos/$REPO/issues" \
              -f "labels=$1" -f state=all -f sort=created -f direction=asc \
              --paginate --slurp \
            | jq -r '[.[][] | select(.pull_request == null)] | first // {}
                     | "\(.number // "") \(.state // "")"'
          }

          # File the tracker, or rewrite it in place and reopen it if it had closed. The body is
          # whichever one the render step wrote for THIS run's condition.
          raise() {   # <label> <title> <colour> <label-description> <reopen-comment>
            local label=$1 title=$2 colour=$3 desc=$4 reopen=$5
            local found num state url

            # Assign, THEN read. `read -r … <<<"$(find_tracker …)"` would take `read`'s exit status
            # instead of the lookup's, so a failed lookup would read as "no tracker exists" and file a
            # fresh duplicate — silently, every day. This way `set -e` aborts on it, loudly (#547).
            found=$(find_tracker "$label")
            read -r num state <<<"$found"
            echo "tracker[$label]: ${num:-none} ${state:-}"

            if [ -z "$num" ]; then
              # Give the label a colour and a description the first time it is needed. Only this branch
              # needs it — an existing tracker already carries it — so a repo that has never hit this
              # condition never grows the label, and a run that does not hit it spends no call on it.
              #
              # `|| true`, deliberately: the probe reads ANY non-zero as "absent", including a 5xx or a
              # rate-limit blip, and the POST that follows would then 422 with `already_exists` and, under
              # `set -e`, abort the step. That would lose the finding to a cosmetic detail about a label,
              # at exactly the moment the sweep is red and has something to say. Label bookkeeping does
              # not get to veto the report; if the label is genuinely unusable, the issue POST below says
              # so loudly.
              if ! gh api "repos/$REPO/labels/$label" --silent 2>/dev/null; then
                gh api -X POST "repos/$REPO/labels" \
                  -f "name=$label" -f "color=$colour" -f "description=$desc" \
                  --silent 2>/dev/null || echo "note: could not create label $label (it probably exists)"
              fi

              url=$(jq -n --arg t "$title" --rawfile b "$RUNNER_TEMP/body.md" --arg l "$label" \
                      '{title:$t, body:$b, labels:[$l]}' \
                    | gh api -X POST "repos/$REPO/issues" --input - --jq .html_url)
              echo "FILED $url"
              echo "- Filed [$label]($url)." >> "$GITHUB_STEP_SUMMARY"
              return
            fi

            # Rewrite the body every run so it is never stale, and reopen if it had closed. A body
            # edit notifies nobody, which is right: while the issue is open it is already somebody's
            # work item and a daily comment on it would be the noise that gets this muted. A REOPEN
            # is a fresh regression, so that one gets a comment — and a notification with it. Which is
            # exactly why it must be TRUE: see the branch below.
            jq -n --rawfile b "$RUNNER_TEMP/body.md" '{body:$b, state:"open"}' \
              | gh api -X PATCH "repos/$REPO/issues/$num" --input - --silent

            if [ "$state" = "closed" ]; then
              gh api -X POST "repos/$REPO/issues/$num/comments" -f "body=$reopen" --silent
              echo "REOPENED #$num"
            else
              echo "UPDATED #$num (already open)"
            fi
            echo "- Updated [$label #$num]($GITHUB_SERVER_URL/$REPO/issues/$num) — still red." >> "$GITHUB_STEP_SUMMARY"
          }

          # The condition is over: say so where the work was filed, and close it. This is the half that
          # keeps a tracker trustworthy — one that only ever opens is one people learn to ignore.
          resolve() {   # <label> <closing-comment>
            local label=$1 closing=$2
            local found num state

            found=$(find_tracker "$label")
            read -r num state <<<"$found"

            if [ -n "$num" ] && [ "$state" = "open" ]; then
              gh api -X POST "repos/$REPO/issues/$num/comments" -f "body=$closing" --silent
              jq -n '{state:"closed", state_reason:"completed"}' \
                | gh api -X PATCH "repos/$REPO/issues/$num" --input - --silent
              echo "CLOSED #$num"
              echo "- Closed [#$num]($GITHUB_SERVER_URL/$REPO/issues/$num)." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "tracker[$label]: nothing open to close."
            fi
          }

          # ── WHICH red is this? (FS.GG.Game#277) ─────────────────────────────────────────────────
          #
          # A red sweep has two utterly different causes. The render step above already knows — it
          # writes a different body for each — and this step used to throw that away and file BOTH to
          # the decay tracker. So an expired token or an exhausted REST budget would REOPEN an issue
          # titled "A published skill points at something that no longer resolves", and comment "the
          # sweep went red again" on it — the one path in this workflow that deliberately NOTIFIES,
          # because a reopen is supposed to mean a fresh regression. Both sentences were false: nothing
          # decayed, and nothing was even looked at. A check that misreports its own subject is the
          # thing this workflow exists to stop; it does not get to do it to itself.
          #
          # `reported` is precisely the bit that separates them — the script prints its FAILED banner if
          # and only if `report()` fired, i.e. iff it judged at least one pointer. So:
          #
          #   rc=0                    the sweep RAN; every pointer resolves.      → decay over, sweep well
          #   rc≠0 · reported=true    the sweep RAN; some pointer does not.       → DECAY  (sweep well)
          #   rc≠0 · reported=false   the sweep judged NOTHING.                   → INFRA  (decay UNKNOWN)
          #
          # And note the two trackers close on DIFFERENT conditions. That asymmetry IS the fix:
          #
          #   The decay tracker is about the TREE, and only a run that actually judged the pointers
          #   knows anything about it. So an infra failure leaves it strictly ALONE — untouched, not
          #   reopened, not closed, not even rewritten. It is not evidence that decay appeared, and it
          #   is not evidence that it went away; closing it would be the more dangerous lie of the two.
          #
          #   The infra tracker is about the SWEEP. Any run that completed is proof the sweep runs
          #   again — so a DECAYED run closes it just as a green one does. Waiting for green would
          #   leave it open across a legitimate decay, asserting the pointers are unchecked when they
          #   were checked and found rotten.
          INFRA_RESOLVED="Resolved: the sweep ran to completion again as of \`${SHA:0:7}\` — every published pointer was judged. Closing. ([run]($RUN_URL))"

          if [ "$RC" = "0" ]; then
            # GREEN. The sweep ran, and every pointer resolves. Both conditions are over.
            resolve "$DECAY_LABEL" "Resolved: every pointer in every published skill resolves again as of \`${SHA:0:7}\`. Closing. ([run]($RUN_URL))"
            resolve "$INFRA_LABEL" "$INFRA_RESOLVED"

          elif [ "$REPORTED" = "true" ]; then
            # DECAY. The sweep judged the pointers and some of them no longer resolve.
            #
            # This is also where the parser-DRIFT body lands (reported=true, findings=0), and that is
            # right: drift means the script found REAL decay that this workflow could not read. That is
            # a fact about the tree, not about the sweep's ability to run — the sweep ran fine.
            raise "$DECAY_LABEL" "$DECAY_TITLE" B60205 \
                  "A pointer published in a product skill stopped resolving. Filed by the skill-refs sweep." \
                  "Reopened: the sweep went red again at \`${SHA:0:7}\`. The decayed pointers are listed in the issue body, which has been rewritten. ([run]($RUN_URL))"
            resolve "$INFRA_LABEL" "$INFRA_RESOLVED"

          else
            # INFRA. The sweep never judged a pointer, so it knows NOTHING about decay — and it does
            # not get to say anything about it. Its own tracker, its own label, its own title.
            #
            # It still gets FILED rather than merely going red, and that is the FS.GG.Game#242 rule
            # holding for this condition too: a failing scheduled run notifies almost nobody, and "the
            # links are UNCHECKED" is not a smaller fact than decay — it is the `FS-GG/.github#416`
            # shape itself, and it is the easier of the two to miss.
            raise "$INFRA_LABEL" "$INFRA_TITLE" D93F0B \
                  "The skill-refs sweep could not run, so every published pointer is unchecked. Filed by the skill-refs sweep." \
                  "Reopened: the sweep failed to run again at \`${SHA:0:7}\`, so the published pointers are unchecked once more. ([run]($RUN_URL))"
            echo "decay tracker: UNTOUCHED — this run judged no pointer, so it is evidence neither way."
            echo "- The decay tracker is untouched: this run judged no pointer, so it knows nothing about decay." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Re-raise the sweep's verdict. The job is RED when a pointer does not resolve — the issue above
      # is where the finding goes to be worked, not a way of swallowing it. What this red must never
      # become is a REQUIRED check: see the header.
      - name: Verdict
        if: steps.sweep.outputs.rc != '0'
        env:
          REPORTED: ${{ steps.sweep.outputs.reported }}
        run: |
          # Which red, and therefore which issue to go and read. Pointing every red at the decay
          # tracker is the FS.GG.Game#277 bug in miniature — and this line is the one a human actually
          # sees on the run, so it does not get to be vague either.
          if [ "$REPORTED" = "true" ]; then
            echo "::notice::The sweep is red: a pointer published in a skill no longer resolves. The finding is on the \`$DECAY_LABEL\` issue; this check does not gate a merge."
          else
            echo "::notice::The sweep is red: it could not RUN, so every published pointer is UNCHECKED — this is NOT decay. The finding is on the \`$INFRA_LABEL\` issue; this check does not gate a merge."
          fi
          exit 1
